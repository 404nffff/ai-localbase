version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: ai-localbase-qdrant
    restart: unless-stopped
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: ai-localbase-backend
    restart: unless-stopped
    depends_on:
      - qdrant
    environment:
      PORT: "8080"
      UPLOAD_DIR: /app/data/uploads
      APP_AUTH_TOKEN: ${APP_AUTH_TOKEN:-change-me-app-token}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_PREFIX: kb_
      QDRANT_VECTOR_SIZE: "${QDRANT_VECTOR_SIZE:-768}"
      QDRANT_DISTANCE: Cosine
      QDRANT_TIMEOUT_SECONDS: "${QDRANT_TIMEOUT_SECONDS:-5}"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend.Dockerfile
    container_name: ai-localbase-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "${FRONTEND_PORT:-4173}:4173"
